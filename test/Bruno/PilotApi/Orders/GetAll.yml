info:
  name: GetAll
  type: http
  seq: 1

http:
  method: GET
  url: "{{Host}}{{controller}}/get-all"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return success", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("should return array", function () {
          const resBody = res.getBody();
          
          expect(resBody).to.be.an("array");
          expect(resBody).to.have.lengthOf.above(1);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
