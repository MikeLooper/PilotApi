info:
  name: Add
  type: http
  seq: 3

http:
  method: POST
  url: "{{Host}}{{controller}}/add"
  body:
    type: json
    data: |-
      {
        "customerID": "VINET",
        "employeeID": 5,
        "freight": 32.3800,
        "orderDate": "1996-07-04T00:00:00",
        "orderID": 10248,
        "requiredDate": "1996-08-01T00:00:00",
        "shipAddress": "123 Main Street",
        "shipCity": "Test City",
        "shipCountry": "France",
        "shipName": "Test Name",
        "shippedDate": "1996-07-16T00:00:00",
        "shipPostalCode": "51100",
        "shipRegion": null,
        "shipVia": 3
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Example: Storing an extracted token or ID from a JSON response
        const jsonData = res.getBody();
        bru.setVar("newId", jsonData.id);
    - type: tests
      code: |-
        test("should return success", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("should return id", function () {
          const resBody = res.getBody();
          
          expect(resBody).to.have.property("id");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
