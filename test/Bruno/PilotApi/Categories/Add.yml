info:
  name: Add
  type: http
  seq: 3

http:
  method: POST
  url: "{{Host}}{{controller}}/add"
  body:
    type: json
    data: |-
      {
        "categoryID": -1,
        "categoryName": "Test Cat",
        "description": "Test Category",
        "picture": null
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Example: Storing an extracted token or ID from a JSON response
        const jsonBody = res.getBody();
        bru.setVar("newId", jsonBody.id);
    - type: tests
      code: |-
        test("should return success", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("should return id", function () {
          const resBody = res.getBody();
          
          expect(resBody).to.have.property("id");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
