opencollection: 1.0.0

info:
  name: PilotApi
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  headers:
    - name: Accept
      value: application/json
    - name: ApiVersion
      value: "1"
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
