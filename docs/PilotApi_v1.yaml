components:
  schemas:
    AddResponseInt:
      type: object
      properties:
        id:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int64
    CategoriesDto:
      required:
        - categoryID
        - categoryName
      type: object
      properties:
        categoryID:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int32
        categoryName:
          type:
            - "null"
            - string
        description:
          type:
            - "null"
            - string
        picture:
          type:
            - "null"
            - string
          format: byte
    CustomersDto:
      required:
        - companyName
        - customerID
      type: object
      properties:
        address:
